<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐧 ペンギン・ハイウェイ</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "Hiragino Sans", "Microsoft JhengHei", system-ui, sans-serif;
  background: linear-gradient(180deg, #cfe9ff 0%, #e8f4ff 100%);
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  color: #1a2e3a; padding: 16px;
}
.card {
  background: #fff; padding: 32px 28px; border-radius: 16px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.12); max-width: 360px; width: 100%;
}
.icon { font-size: 48px; text-align: center; margin-bottom: 8px; }
h1 { text-align: center; font-size: 20px; margin-bottom: 4px; }
.sub { text-align: center; color: #6a7a85; font-size: 13px; margin-bottom: 22px; }
input {
  width: 100%; padding: 12px 14px; font-size: 15px;
  border: 1px solid #c8d8e4; border-radius: 8px; margin-bottom: 10px;
  font-family: inherit;
}
input:focus { outline: none; border-color: #4a90c2; box-shadow: 0 0 0 3px rgba(74,144,194,0.15); }
button {
  width: 100%; padding: 12px; font-size: 15px; font-weight: 600;
  background: #4a90c2; color: #fff; border: none; border-radius: 8px; cursor: pointer;
  transition: background 0.15s;
}
button:hover:not(:disabled) { background: #3a78a0; }
button:disabled { background: #aaa; cursor: wait; }
.error { color: #d04040; margin-top: 12px; font-size: 13px; text-align: center; min-height: 18px; }
.footer { text-align: center; font-size: 11px; color: #98a8b2; margin-top: 18px; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">🐧</div>
  <h1>ペンギン・ハイウェイ</h1>
  <div class="sub">アカウントとパスワードを入力してください</div>
  <form id="f">
    <input id="user" type="text" placeholder="アカウント / Username" autofocus required autocomplete="username" autocapitalize="off" autocorrect="off">
    <input id="pw" type="password" placeholder="パスワード / Password" required autocomplete="current-password">
    <button type="submit" id="btn">Enter</button>
    <div class="error" id="err"></div>
  </form>
  <div class="footer">v0.1 — encrypted build</div>
</div>

const ITER = 250000;

function b64decode(s) {
  const bin = atob(s);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}

async function tryDecrypt(username, password) {
  const data = b64decode(PAYLOAD);
  const salt = data.slice(0, 16);
  const iv   = data.slice(16, 28);
  const tag  = data.slice(28, 44);
  const ct   = data.slice(44);
  const enc = new TextEncoder();
  const secret = enc.encode(username + ":" + password);
  const baseKey = await crypto.subtle.importKey("raw", secret, "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: salt, iterations: ITER, hash: "SHA-256" },
    baseKey, { name: "AES-GCM", length: 256 }, false, ["decrypt"]
  );
  const ctTag = new Uint8Array(ct.length + tag.length);
  ctTag.set(ct); ctTag.set(tag, ct.length);
  const ptBuf = await crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, ctTag);
  return new TextDecoder().decode(ptBuf);
}

document.getElementById("f").addEventListener("submit", async (e) => {
  e.preventDefault();
  const user = document.getElementById("user").value.trim();
  const pw = document.getElementById("pw").value;
  const btn = document.getElementById("btn");
  const err = document.getElementById("err");
  err.textContent = "";
  btn.disabled = true; btn.textContent = "解読中…";
  try {
    const html = await tryDecrypt(user, pw);
    document.open(); document.write(html); document.close();
  } catch (e) {
    err.textContent = "✗ アカウントまたはパスワードが違います";
    btn.disabled = false; btn.textContent = "Enter";
    document.getElementById("pw").select();
  }
});
</script>
